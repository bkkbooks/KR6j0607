body:
  text: 西天譯經三藏朝散大夫試鴻臚卿傳法大師臣施護奉詔譯爾時帝釋天主說自莊嚴明曰三野體難難左引度努𠺽穌引那帝引穌引那帝引帝引那帝引帝引那帝引努哩彌二合引酥彌引那摩彌引那彌引底隷彌隷摩摩薩哩嚩二合薩怛嚩二合引喃引洛乞叉二合引迦嚕引引扇引底娑嚩二合悉怛也三合野喃野引嚩切摩引滿鄧迦嚕彌娑嚩二合引賀引爾時毘沙門天王說自莊嚴明曰三野體難難尼引馱努史引迦儞愈二合引哆訖哩二合目枳引入嚩二合隷引那彌引尾賀隷娑引哩引娑哩嚩底扇引底娑嚩二合悉怛也三合野喃摩摩薩哩嚩二合薩怛嚩二合引喃引左夜引嚩切摩引滿度引婆挽覩娑嚩二合引賀引爾時持國天王說自莊嚴明曰三野體難馱哩引難馱哩引馱囉尼馱哩引阿左愈二合帝布嚕母嚕扇引底孕二合娑嚩二合悉怛也三合野喃摩摩薩哩嚩二合薩怛嚩二合喃引左洛羼迦嚕引彌夜嚩切摩滿度引婆挽覩娑嚩二合引賀引爾時增長天王說自莊嚴明曰三野體難暗拏哩引半多哩引迦囉引帝引迦囉半帝引迦囉嚕鼻引迦哩馱哩引迦曩迦鉢怛哩二合引嚕嚕彌乞叉二合乞叉二合彌引阿引乞叉二合彌引波乞叉二合扇引底孕二合娑嚩二合悉怛也三合野喃摩摩薩哩嚩二合薩怛嚩二合喃引左洛乞叉二合引俱嚕夜引嚩切摩引滿鄧婆嚩覩娑嚩二合引賀引爾時廣目天王說自莊嚴明曰三野體難摩惹羅惹羅惹惹摩羅地哩地哩迦哩迦哩三滿哆枳哩枳哩扇引底娑嚩二合悉怛也三合野喃摩摩薩哩嚩二合薩怛嚩二合引喃引左夜引嚩切引麼滿鄧迦嚕引彌娑嚩二合引賀引爾時妙月天子說自莊嚴明曰三野體難唵引嚩引禰引尾摩隷引鉢囉二合婆引娑嚩二合哩引設多囉濕彌二合引娑賀娑囉二合𡆆濕彌二合引鉢囉二合底娑囉底娑嚩二合底娑嚩二合悉怛也三合野喃俱嚕摩摩薩哩嚩二合薩怛嚩二合引喃引夜嚩切摩引滿鄧迦嚕引彌娑嚩二合引賀引爾時一切天眾異口同聲說莊嚴明曰三野體難俱嚕俱嚕酥嚕酥嚕布嚕布嚕扇引底孕二合娑嚩二合悉怛也三合野喃俱嚕摩摩薩哩嚩二合薩怛嚩二合喃引左野引嚩切摩滿鄧迦嚕引彌娑嚩二合引賀引爾時諸星宿天異口同聲說莊嚴明曰三野體難哆隷引哆摩隷引阿隷引那隷引阿引迦引舍尾摩隷引扇引底孕二合娑嚩二合悉怛也三合野喃迦嚕引彌摩摩薩哩嚩二合薩怛嚩二合喃引左野引嚩切摩引滿鄧迦嚕引彌娑嚩二合引賀引爾時一切龍眾異口同聲說莊嚴明曰三野體難嚩隷摩隷阿左隷麼地引阿引戍麼地引布引計扇引底孕二合娑嚩二合悉怛也三合野喃俱嚕摩摩薩哩嚩二合薩怛嚩二合喃引左野引嚩切摩滿鄧迦嚕引彌娑嚩二合引賀引爾時二十八大藥叉軍主眾異口同聲說莊嚴明曰三野體難涅哩二合茶鉢底鉢底嚕嚕達囉達囉扇底孕二合娑嚩二合悉怛也三合野喃迦嚕引彌摩摩薩哩嚩二合薩怛嚩二合喃引左野引嚩切摩引滿鄧迦嚕引彌娑嚩二合引賀引爾時畢隷多毘舍遮鳩槃茶等眾異口同聲說莊嚴明曰三野體難尾部底三挽哩哆引曩引尾部底扇底孕二合娑嚩二合悉怛也三合野喃摩摩薩哩嚩二合引薩怛嚩二合引喃引左野引嚩切摩滿鄧迦嚕引彌娑嚩二合引賀引爾時布單曩羯吒布單曩眾異口同聲說莊嚴明曰三野體難波努彌引迦囉引帝引鳥馱野二合哆祖囉拏二合娑彌囉尼引醋半底扇底孕二合娑嚩二合悉怛也三合野喃迦嚕引彌摩摩薩哩嚩二合薩怛嚩二合引室左二合野引嚩切摩引滿鄧迦嚕引彌娑嚩二合引賀引爾時一切末怛哩二合眾異口同聲說莊嚴明曰三野體難迦隷摩計引隷引哆哩引哆摩哩引扇引底孕二合娑嚩二合悉怛也三合野喃迦嚕引彌摩摩薩哩嚩二合薩怛嚩二合引喃引野引嚩切摩滿鄧迦嚕彌娑嚩二合引賀引爾時四方四羅剎異口同聲說莊嚴明曰三野體難阿儞引播引儞引佉濟引佉嚩濟引祛祛哩隷閉波哩賀引哩扇底娑嚩二合悉怛也三合野喃迦嚕引彌摩摩薩哩嚩二合薩怛嚩二合引喃引左野引嚩切摩引滿鄧迦嚕引彌娑嚩二合引賀引爾時捺囉彌多羅剎女說莊嚴明曰三野體難那那哩引那哩引賀賀賀賀呬呬呬呬護護護護尸枳枳枳唧枳唧尾目契摩佉惹佉喫吒彌致桉吒桉吒吒囉吒吒訖囉二合摩惹俱儒俱儒努努努努嚕二合努嚕二合怛嚕二合切彌隷彌彌隷阿曩過過欠彌努努努底體底彌底儞體隷彌致唧底彌致隷致閉致閉怛哩二合閉怛哩二合尼努呬儞母呬儞羅呬引嚩呬引那姹閉引曳爾時娑婆世界主大梵天王前白佛言世尊我等天眾龍眾夜叉眾乃至捺囉彌帝如是等眾悉於此時對世尊前各說自明為欲擁護羅睺羅童子不令一切惡鬼神類侵近惱亂得晝安隱得夜安隱及一切時獲住快樂世尊我等所說自明不唯擁護羅睺羅童子亦與未來一切眾生而作擁護世尊若有眾生得聞我等如是諸明當須志心憶念受持當令彼等一切行不饒益種種之類或一由旬或二由旬或三四由旬乃至十由旬內不敢侵近驚怖退散遠避而去能令如是十由旬內諸惡消滅疾沴不行刀兵毒藥皆悉遠離亦復不為一切天龍夜叉羅剎乾闥婆阿修羅迦樓羅緊曩羅摩睺羅伽等而為障礙亦復不為一切部多非人之類而為障礙世尊如是等眾若有違逆不隨順者彼眾不容斥令離族爾時世尊告阿難言此大梵天王而於我前說是誠實之言我已證知阿難我所宣說大莊嚴陀羅尼有大力勢能伏諸惡有所饒益我已先說阿難若復有人以彼一切人非人等邪明呪術欲於眾生執持繫縛種種惱亂或在地上或在虛空或在山際或在山頂及一切處以我聖莊嚴陀羅尼威德力故悉皆破滅於諸眾生不能為害佛復謂阿難言佛真實法真實僧真實天真實仙真實如是五者不可違逆阿難如我所說汝善受持使於未來流行世間與諸眾生為大饒益佛說是經已時羅睺羅童子得聞世尊說大莊嚴陀羅尼及承一切明而擁護故不離是會得安隱樂心意快然歡喜踊躍以頭著地禮如來足與諸侍人還復王宮慈氏菩薩阿難陀乃至天龍夜叉及一切人非人等聞佛所說歡喜信受禮佛而退
