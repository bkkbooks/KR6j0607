body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿傳法大師臣施護奉詔譯如是我聞一時世尊在迦毘羅城無憂樹園與阿難陀等大比丘眾及慈氏菩薩摩訶薩俱會一處是時復有天眾龍眾夜叉眾羅剎眾阿修羅眾迦樓羅眾乾闥婆眾緊曩羅眾毘舍遮眾畢哩多眾鳩槃茶眾布單曩眾執魅眾二十八大藥叉軍主眾四大藥叉軍主眾一切星曜眾乃至雪山苦行諸仙眾如是等眾皆來集會復有他方一切羅剎等眾所謂護迦儞隷布寫那哩枳吒迦囉拏穌摩娜摩賀賀哩摩怛哩眾如是等眾亦來集會復有四方四大羅剎所謂東方賀哩羅剎南方虞拏羅剎西方枳設哩羅剎北方摩尼袒哆羅剎此四羅剎性極暴惡各有六十眷屬是等羅剎亦來在會爾時淨飯王宮羅睺羅童子於夜臥時為惡羅剎而來嬈亂數數驚怖不得安隱時羅睺羅母耶輸陀羅及諸眷屬悉知世尊與諸聖眾在無憂樹園去宮城不遠於夜後分令羅睺羅與眾童子及諸侍人前後導從往詣佛所時羅睺羅童子至佛會已頂禮佛足獨於佛前涕泣而住爾時世尊告阿難言阿難汝見羅睺羅童子來詣我所涕泣已否阿難言唯然已見佛言阿難羅睺羅童子於夜臥時為惡羅剎及種種鬼神而來嬈亂不得安隱故來我所而求擁護阿難非獨今日羅睺羅童子彼此嬈亂不得安隱我滅度後末世之時一切眾生福力微劣於不善業增益熾盛由是諸惡羅剎及鬼神等遊行世間恒與眾生作不饒益種種嬈亂使無安隱我觀是事深可憐愍阿難我今為擁護羅睺羅童子及愍念未來眾生說大莊嚴陀羅尼汝當諦聽是時阿難及會大眾咸各默然願佛宣說爾時世尊即說大莊嚴陀羅尼曰怛儞也二合引他引伽儞引誐囉二合引伽曩鉢底具彌引誐囉二合引具摩鉢底瑟波二合哩引迦伽哩尼伽囉鉢底娑引囉鉢底馱曩鉢底酥囉鉢底阿隷半阿隷半鉢底摩鉢底阿鉢底嚩護鉢底護羅賀囉二合引呬隷誐囉二合護嚕烏底隷普呬隷唵引唧致隷鉢哆二合鉢致引吒吒吠引賀囉二合引唵引羅吠引摩尼娑哩引護摩賀引呬隷護護三滿多娑娑哩阿三滿多娑哩波隷佉娑哩引阿引挽哩哆二合摩賀引挽哩帝二合引伽儞引彌佉隷引賀囉二合引娑嚩二合引賀引阿難此大莊嚴陀羅尼乃是過去諸佛之所宣說我今為擁護羅睺羅童子亦復利益末世眾生今復宣說阿難若有眾生被諸羅剎及惡鬼神種種嬈亂者當以此莊嚴陀羅尼書於紙素作彼隨求戴於身臂當令諸惡羅剎乃至世間一切食膏血者惡鬼神類不敢侵近悉皆奔走四方四維十由旬外遠避而去當令眾生得安隱樂阿難若有眾生恒常讀誦此大莊嚴陀羅尼者所有一切刀杖毒藥不能為害乃至邪明呪術羂索繫縛人及非人一切惡事悉皆解脫乃至十由旬內一切眾生皆蒙擁護一切災沴咸皆殄滅阿難若有眾生欲持念此大莊嚴陀羅尼擁護自身及為饒益一切眾生者先當擇取清淨勝地預立幖幟然自齋戒香水澡浴當令身心內外清淨以線結界香泥塗地作曼拏羅於曼拏羅中備諸名花塗香燒香然燈種種供養面北端坐正念想佛世尊來降曼拏羅已然後奉獻種種供養歸命讚歎發堅固心勇猛不退為欲饒益擁護諸眾生故及求現前所作成就故先當持誦結界莊嚴陀羅尼警覺召請梵王帝釋及一切天龍夜叉羅剎諸鬼神等皆來集會當令世間一切惱害眾生諸惡夜叉羅剎部多等聞此陀羅尼已驚怖退散無諸障難得願圓滿即說結界陀羅尼曰怛儞也二合引他儞隷儞隷尾摩隷引怛摩隷引護唧護唧悉哩底哩怛哩二合娑儞引囉普莎賀引阿難若誦此結界莊嚴陀羅尼已然後誦彼聖大莊嚴陀羅尼一切所作無不成就爾時慈氏菩薩摩訶薩從座而起住立佛前白言世尊我亦為欲擁護羅睺羅童子令得安隱亦復為欲利益未來一切眾生所有被諸嬈惱及一切惡人刀杖毒藥諸惡禁呪羂索繫縛如是等事悉令解脫於晝夜中安隱快樂亦說莊嚴陀羅尼惟願世尊許我宣說佛言當隨汝意爾時慈氏菩薩即說莊嚴陀羅尼曰怛儞也二合引他引阿嚩那引底播那引儞阿尾那引努祖嚕祖嚕惹哩馱二合難尼引難尼引阿馱難尼引三滿哆難尼引儞哩瞢二合尼引儞哩弭二合引目儞引扇引底娑嚩二合悉怛也三合引野喃摩摩薩哩嚩二合薩怛嚩二合引喃引左洛乞叉二合引俱嚕娑嚩二合引賀引爾時娑婆世界主大梵天王前白佛言我亦為欲擁護羅睺羅童子及擁護未來一切眾生說自莊嚴明惟願如來許我宣說佛言善哉善哉當隨汝意時大梵天王即說莊嚴明曰三野體難盎虞哩引半虞哩引阿努哩引嫩努哩引尸契孕二合迦尸佉哩引嫩度哩引努哩努二合囉野底阿左阿左尾目左扇引底孕二合娑嚩二合悉怛野三合野喃俱嚕摩摩薩哩嚩二合薩怛嚩二合引喃引左娑嚩二合引賀引爾時世尊知彼天眾龍眾夜叉等眾及諸鬼神各各為欲擁護羅睺羅童子及未來眾生皆悉欲說自明佛言汝等天眾龍眾及諸鬼神等欲說自明為擁護諸眾生者隨汝等意各各說之爾時善時分天即於佛前說自明曰三野體難囉瑟致哩三合引波那引瑟致哩三合引嚕地囉迦囉尼二合引儼鼻哩引努哩努二合哩母唧引設引訖哩二合囉引濟曳二合引扇引底孕二合娑嚩二合悉怛也三合野喃迦嚕弭摩摩洛乞叉二合引俱嚕娑嚩二合引賀引
